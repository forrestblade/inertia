# Cloudflare Tunnel config for Inertia Studio
# Place at: /home/agent/.cloudflared/config.yml
# Replace TUNNEL_ID with the actual tunnel UUID from `cloudflared tunnel create`

tunnel: TUNNEL_ID
credentials-file: /home/agent/.cloudflared/TUNNEL_ID.json

ingress:
  - hostname: inertiawebsolutions.com
    service: http://localhost:5173
  - hostname: www.inertiawebsolutions.com
    service: http://localhost:5173
  - service: http_status:404
