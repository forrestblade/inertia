name: CI

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]
  workflow_dispatch:
  schedule:
    # Weekly flaky detection: every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  unit:
    needs: [lint, typecheck]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Run unit tests excluding quarantined flaky tests
      - name: Run unit tests (excluding quarantined)
        run: pnpm test:ci

  # Separate job: run quarantined tests in isolation, failures allowed
  quarantine:
    needs: [unit]
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run quarantined flaky tests
        run: pnpm test:quarantine
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quarantine-results
          path: quarantine-report.json
          retention-days: 30

  integration:
    needs: [unit]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx vitest run tests/integration/
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres

  e2e:
    needs: [unit]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm test:e2e
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage:
    needs: [unit]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cd packages/cms && npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  security:
    needs: [lint]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  # Weekly: detect flaky tests by running suite twice and comparing results
  flaky-detection:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run Vitest flaky detection (2 runs, compare results)
        run: bash scripts/detect-flaky-vitest.sh --output=vitest-flaky-report.json
        continue-on-error: true
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Run Playwright flaky detection (5x repeat-each)
        run: npx playwright test --config=tests/e2e/flaky-detection.config.ts
        continue-on-error: true
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - name: Upload flaky detection reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flaky-detection-report-${{ github.run_id }}
          path: |
            vitest-flaky-report.json
            flaky-detection-report.json
            playwright-report-flaky/
          retention-days: 90

  # Weekly: check that no quarantined test has exceeded its 30-day SLA
  flaky-deadline-check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Check flaky test deadlines
        id: deadline-check
        run: bash scripts/check-flaky-deadlines.sh
        continue-on-error: true
      - name: Create GitHub issue for expired quarantined tests
        if: steps.deadline-check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          EXPIRED_LIST=$(jq -r \
            '.quarantined[] | select(.deadline <= "'"$TODAY"'") | "- **\(.testName)**  \n  File: `\(.file)`  \n  Deadline: \(.deadline)  \n  Reason: \(.reason)"' \
            flaky-tests.json)

          gh issue create \
            --title "ALERT: Quarantined flaky tests have exceeded 30-day SLA ($TODAY)" \
            --label "flaky-test" \
            --body "## Expired Flaky Test Quarantine

          The following tests were quarantined more than 30 days ago and have exceeded their resolution SLA.

          **Action required:** Each test must be either fixed or deleted within 48 hours.

          ### Expired Tests

          ${EXPIRED_LIST}

          ### Resolution Process

          1. Fix the root cause and remove the \`@flaky\` tag and \`flaky-tests.json\` entry
          2. If the test is no longer valid, delete it entirely
          3. If more time is needed, create a new issue and re-quarantine with a justification

          See [FLAKY-TESTS.md](../blob/development/FLAKY-TESTS.md) for the full process."

  publish:
    needs: [unit, integration, e2e, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish packages
        run: |
          for pkg in packages/ui packages/core packages/db packages/telemetry packages/cms packages/valence; do
            cd "$GITHUB_WORKSPACE/$pkg"
            VERSION=$(node -p "require('./package.json').version")
            NAME=$(node -p "require('./package.json').name")
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" != "$VERSION" ]; then
              pnpm publish --access public --provenance --no-git-checks
              echo "Published $NAME@$VERSION"
            else
              echo "Skipped $NAME@$VERSION (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  release:
    needs: [publish]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - name: Create GitHub releases for newly published packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in packages/ui packages/core packages/db packages/telemetry packages/cms packages/valence; do
            VERSION=$(node -p "require('./$pkg/package.json').version")
            NAME=$(node -p "require('./$pkg/package.json').name")
            SHORT=$(echo "$NAME" | sed 's/@valencets\///')
            TAG="${SHORT}@${VERSION}"

            # Skip if tag already exists
            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
              continue
            fi

            # Check if this version was actually published (not skipped)
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" != "$VERSION" ]; then
              echo "Version $NAME@$VERSION not on npm, skipping release"
              continue
            fi

            # Find previous tag for this package to generate changelog
            PREV_TAG=$(git tag -l "${SHORT}@*" --sort=-v:refname | head -1)
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD -- "$pkg")
            else
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20 -- "$pkg")
            fi

            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="- Release $TAG"
            fi

            # Create tag and release
            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --title "$NAME v$VERSION" \
              --notes "$(printf '## %s v%s\n\n### Changes\n\n%s\n\n### Install\n\n```bash\npnpm add %s@%s\n```' "$NAME" "$VERSION" "$CHANGELOG" "$NAME" "$VERSION")"

            echo "Created release $TAG"
          done
